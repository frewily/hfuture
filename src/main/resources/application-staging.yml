spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://staging-db-read-replica:3306/hfuture_prod?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=Asia/Shanghai
    username: ${DB_USER:staging_readonly}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 15
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
  
  data:
    redis:
      host: staging-redis-replica
      port: 6379
      password: ${REDIS_PASSWORD}
      database: 2
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 24
          max-wait: -1ms
          max-idle: 12
          min-idle: 4

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

logging:
  level:
    top.hfuture: warn
    org.springframework.web: warn

hfut:
  cas:
    base-url: http://cas.hfut.edu.cn/cas
    login-url: ${hfut.cas.base-url}/login
    vercode-url: ${hfut.cas.base-url}/vercode
    check-init-url: ${hfut.cas.base-url}/checkInitParams
  
  eams:
    base-url: http://jxglstu.hfut.edu.cn/eams5-student
    sso-login-url: ${hfut.eams.base-url}/neusoft-sso/login
    course-table-url: ${hfut.eams.base-url}/for-std/course-table
    get-data-url: ${hfut.eams.base-url}/for-std/course-table/get-data
    schedule-datum-url: ${hfut.eams.base-url}/ws/schedule-table/datum
