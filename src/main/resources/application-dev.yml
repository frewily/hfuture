spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/hfuture_dev?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    top.hfuture: debug
    org.springframework.web: debug

hfut:
  cas:
    base-url: http://cas.hfut.edu.cn/cas
    login-url: ${hfut.cas.base-url}/login
    vercode-url: ${hfut.cas.base-url}/vercode
    check-init-url: ${hfut.cas.base-url}/checkInitParams
  
  eams:
    base-url: http://jxglstu.hfut.edu.cn/eams5-student
    sso-login-url: ${hfut.eams.base-url}/neusoft-sso/login
    course-table-url: ${hfut.eams.base-url}/for-std/course-table
    get-data-url: ${hfut.eams.base-url}/for-std/course-table/get-data
    schedule-datum-url: ${hfut.eams.base-url}/ws/schedule-table/datum
    student-info-url: ${hfut.eams.base-url}/home
