spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://prod-db-master:3306/hfuture_prod?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=Asia/Shanghai
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
      leak-detection-threshold: 60000
  
  data:
    redis:
      host: ${REDIS_HOST:prod-redis-master}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      database: 3
      timeout: 3000ms
      ssl:
        enabled: true
      lettuce:
        pool:
          max-active: 32
          max-wait: -1ms
          max-idle: 16
          min-idle: 8

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

logging:
  level:
    top.hfuture: error
    org.springframework.web: error
  file:
    name: /var/log/hfuture/application.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

hfut:
  cas:
    base-url: http://cas.hfut.edu.cn/cas
    login-url: ${hfut.cas.base-url}/login
    vercode-url: ${hfut.cas.base-url}/vercode
    check-init-url: ${hfut.cas.base-url}/checkInitParams
  
  eams:
    base-url: http://jxglstu.hfut.edu.cn/eams5-student
    sso-login-url: ${hfut.eams.base-url}/neusoft-sso/login
    course-table-url: ${hfut.eams.base-url}/for-std/course-table
    get-data-url: ${hfut.eams.base-url}/for-std/course-table/get-data
    schedule-datum-url: ${hfut.eams.base-url}/ws/schedule-table/datum
